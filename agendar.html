<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agendar Consulta — Gaia Company</title>
  <link rel="stylesheet" href="../css/styleAgendar.css"> <!-- link para o CSS específico da página de agendamento -->
</head>
<body>
  <nav> <!-- barra de navegação com logo e links -->
    <a class="brand" href="../index.html">
      <img src="../img/logo.webp" alt="Logo" class="logo-img">
      <span class="brand-name">Gaia Company</span>
    </a>
    <div class="nav-links">
      <a class="nav-link" href="../index.html#processos">Processo</a>
      <a class="nav-link" href="sobre.html">Sobre</a>
      <a class="nav-link" href="agendar.html">Agendar</a>
    </div>
  </nav>
  <main> <!-- conteúdo principal da página -->
    <h1>Agende sua Consulta</h1>
    <p>Preencha os dados abaixo e escolha o melhor horário.</p>
    <form> <!-- formulário de agendamento -->
      <h2>Dados da Empresa</h2>
      <label for="empresa">Nome da Empresa</label>  
      <input type="text" id="empresa" placeholder="Ex: Empresa Sustentável Ltda"> <!-- campo de texto para o nome da empresa -->
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="contato@empresa.com"> <!-- campo de email para contato -->
      <label for="telefone">Número para Contato</label>
      <input type="tel" id="telefone" placeholder="(00) 00000-0000"> <!-- campo de telefone para contato -->
      <label for="area">Área de Atuação</label>
      <select id="area"> <!-- campo de seleção para área de atuação da empresa -->
        <option value="" disabled selected>Selecione a área</option>
        <option>Agronegócio</option>
        <option>Construção Civil</option>
        <option>Indústria</option>
        <option>Logística e Transporte</option>
        <option>Varejo</option>
        <option>Tecnologia</option>
        <option>Saúde</option>
        <option>Educação</option>
        <option>Outro</option>
      </select>
      <h2>Data e Horário</h2> <!-- seção para escolher data e horário da consulta -->
      <label for="data">Escolha a Data para uma reunião inicial</label>
      <input type="date" id="data"> <!-- campo de data para escolher o dia da consulta -->
      <label for="horario">Escolha o Horário</label>
      <select id="horario">
        <option value="" disabled selected>Selecione um horário</option>
        <option>09:00</option>
        <option>10:00</option>
        <option>11:00</option>
        <option>14:00</option>
        <option>15:00</option>
        <option>16:00</option>
      </select>
      <label for="obs">Observações (opcional)</label>
      <textarea id="obs" placeholder="Conte brevemente sobre o desafio ambiental da sua empresa..."></textarea>
      <button type="submit">Confirmar Agendamento</button>
    </form>
  </main>
  <footer>
    <p>© 2025 Gaia Company. Todos os direitos reservados.</p>
    <div>
      <a href="https://instagram.com/gaiacompany">Instagram</a>
      <a href="https://linkedin.com/company/gaiacompany">LinkedIn</a>
      <a href="gmail.com">gaiacompany@gmail.com</a>
    </div>
  </footer>
</body>
</html>
